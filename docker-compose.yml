version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projet-ia-app
    ports:
      - "8080:80"
    environment:
      # Paramètres de Production simulés
      - APP_ENV=production
      - APP_DEBUG=false
      # Le fallback_key sert au test local uniquement, en prod on injecte la variable
      - APP_KEY=${APP_KEY:-base64:q3D7T7X/KzL5TzWgS5R5b+I+V1v6bWzP6mIe+A+Nn78=}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      # Utiles si logs/sessions
      - LOG_CHANNEL=stderr
      - SESSION_DRIVER=file
    volumes:
      # Utilisation d'un volume Docker pour persister la base SQLite aux redémarrages
      - sqlite-data:/var/www/html/database

volumes:
  sqlite-data:
